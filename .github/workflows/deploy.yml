name: Deploy React App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_FIREBASE_PRIVATE_KEY: ${{ secrets.VITE_FIREBASE_PRIVATE_KEY }}
          VITE_FIREBASE_MEASURING_ID: ${{ secrets.VITE_FIREBASE_MEASURING_ID }}
          VITE_DEFAULT_BRANCH_ID: ${{ secrets.VITE_DEFAULT_BRANCH_ID }}

      - name: Compress Build
        run: |
          set -euo pipefail
          test -f dist/index.html
          tar -czf build.tar.gz dist
          test -s build.tar.gz

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Missing required SERVER_HOST secret}"
          : "${SERVER_SSH_KEY:?Missing required SERVER_SSH_KEY secret}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          ssh-keyscan -T 60 -H "$SERVER_HOST" >> ~/.ssh/known_hosts || \
            echo "::warning::ssh-keyscan failed for SERVER_HOST; deploy will use accept-new host key checking"

      - name: Upload Build
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Missing required SERVER_HOST secret}"
          : "${SERVER_USER:?Missing required SERVER_USER secret}"

          if ! timeout 5m ssh \
            -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$SERVER_USER@$SERVER_HOST" 'cat > /tmp/build.tar.gz' < build.tar.gz; then
            echo "::error::Build succeeded, but upload to the deployment server failed. The build artifact is attached to this workflow run. Check SERVER_HOST connectivity, firewall, SSH access, and write permission for /tmp/build.tar.gz."
            exit 1
          fi

      - name: Deploy to Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Missing required SERVER_HOST secret}"
          : "${SERVER_USER:?Missing required SERVER_USER secret}"
          timeout 10m ssh \
            -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$SERVER_USER@$SERVER_HOST" <<'EOF'
            test -s /tmp/build.tar.gz
            sudo rm -rf /var/www/react-app/*
            sudo mkdir -p /var/www/react-app
            sudo tar -xzf /tmp/build.tar.gz -C /var/www/react-app --strip-components=1
            sudo test -f /var/www/react-app/index.html
            sudo rm /tmp/build.tar.gz
            sudo systemctl restart nginx
          EOF
